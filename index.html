<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEXUS | SUGIRA - Infrastructure Orchestration Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            min-height: 100vh;
            overflow-x: hidden;
            color: #e6edf3;
        }

        /* CANVAS 3D BACKGROUND */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* MAIN CONTENT */
        .app {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* HERO SECTION WITH TERMINAL EFFECT */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .terminal-badge {
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 0.5rem 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #0ff;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.3); border-color: rgba(0, 255, 255, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); border-color: rgba(0, 255, 255, 0.8); }
        }

        .glitch-text {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 800;
            position: relative;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #0ff 30%, #f0f 70%, #fff 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shine 8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #8b9bb0;
            max-width: 700px;
            margin: 1rem auto;
            line-height: 1.6;
        }

        .network-stats {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1rem 2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #0ff;
        }

        /* MAIN DASHBOARD */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* MODERN TABS SYSTEM */
        .tabs-container {
            margin-bottom: 3rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 1.8rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #8b9bb0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border-radius: 12px;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0ff;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .tab-btn.active {
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .tab-btn.active::before {
            transform: scaleX(1);
        }

        .tab-btn:hover:not(.active) {
            color: #c0d4f0;
        }

        /* SEARCH & FILTERS */
        .controls {
            margin-bottom: 2rem;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            font-size: 1rem;
            color: #e6edf3;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        .search-input-wrapper input:focus {
            outline: none;
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .filter-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.6rem 1.4rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .filter-chip.active {
            background: #0ff;
            color: #0a0c12;
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        /* GRID CARDS - NEON TECH */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .tech-card {
            background: linear-gradient(135deg, rgba(10, 20, 30, 0.7), rgba(0, 0, 0, 0.8));
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .tech-card:hover::before {
            left: 100%;
        }

        .tech-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #0ff;
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: 0.3s;
        }

        .tech-card:hover .card-icon {
            transform: rotate(5deg) scale(1.1);
            background: rgba(0, 255, 255, 0.2);
        }

        .card-category {
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #9aaebf;
            line-height: 1.5;
        }

        /* IFRAME VIEWER */
        .viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .viewer-title {
            font-family: 'JetBrains Mono', monospace;
            color: #0ff;
        }

        .viewer-controls {
            display: flex;
            gap: 1rem;
        }

        .viewer-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: #0ff;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .viewer-btn:hover {
            background: rgba(0, 255, 255, 0.3);
        }

        .viewer-content {
            flex: 1;
            width: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* BREADCRUMB */
        .breadcrumb {
            margin-bottom: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #0ff;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: 0.2s;
        }

        .breadcrumb span:hover {
            text-shadow: 0 0 8px #0ff;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0c12;
        }

        ::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 2rem 1rem;
            }
            .resources-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                gap: 0.5rem;
            }
            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="app">
    <!-- HERO SECTION -->
    <div class="hero">
        <div class="terminal-badge">
            <span>>_ NEXUS_OS v2.0.4 [INFRASTRUCTURE ORCHESTRATOR]</span>
        </div>
        <div class="glitch-text">SUGIRA NEXUS</div>
        <p class="hero-subtitle">
            [SYSTEM] | [NETWORK] | [CLOUD] | [DEVOPS]<br>
            Infrastructure Convergence Hub — Orchestration Layer pour l'ingénierie moderne
        </p>
        <div class="network-stats">
            <div class="stat-item"><span class="stat-number" id="stat-cours">0</span><br>RESSOURCES</div>
            <div class="stat-item"><span class="stat-number">99.9%</span><br>UPTIME</div>
            <div class="stat-item"><span class="stat-number">∞</span><br>SCALABILITY</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="breadcrumb" id="breadcrumb">
            <span id="home-breadcrumb">🏠 NEXUS_HOME</span>
        </div>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="all">📡 ALL_NODES</button>
                <button class="tab-btn" data-tab="academique">📘 COURS.ACAD</button>
                <button class="tab-btn" data-tab="tp">⚙️ LAB.TP</button>
                <button class="tab-btn" data-tab="commandes">💾 ADMIN.CMD</button>
                <button class="tab-btn" data-tab="portfolio">🎯 PORTFOLIO</button>
            </div>
        </div>

        <div class="controls">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" placeholder=">_ grep -r 'recherche' --infrastructure">
                </div>
            </div>
            <div class="filter-group" id="techFilters">
                <div class="filter-chip active" data-tech="all">#ALL</div>
                <div class="filter-chip" data-tech="system">#SYSTEM</div>
                <div class="filter-chip" data-tech="network">#NETWORK</div>
                <div class="filter-chip" data-tech="cloud">#CLOUD</div>
                <div class="filter-chip" data-tech="devops">#DEVOPS</div>
            </div>
        </div>

        <div id="resourcesGrid" class="resources-grid"></div>
    </div>
</div>

<!-- IFRAME VIEWER -->
<div id="viewerOverlay" class="viewer-overlay">
    <div class="viewer-header">
        <div class="viewer-title" id="viewerTitle">Chargement...</div>
        <div class="viewer-controls">
            <button class="viewer-btn" id="closeViewer">✕ FERMER</button>
        </div>
    </div>
    <div class="viewer-content">
        <iframe id="viewerIframe" src="about:blank"></iframe>
    </div>
</div>

<script>
    // ============= DATASET AVEC TAGS TECHNIQUES =============
    const ressources = [
        // ACADEMIQUE
        { titre: "Gestion de Projet", categorie: "academique", tech: "devops", url: "https://sugira-yannick.github.io/Sugira-Yannick/Gestion-Projet", desc: "Méthodologie de gestion agile et prédictive" },
        { titre: "Méthodes Agiles", categorie: "academique", tech: "devops", url: "https://sugira-yannick.github.io/Sugira-Yannick/Methodes-Agiles", desc: "Scrum, Kanban, Lean — Framework itératifs" },
        { titre: "Admin & Sécurité BYOD", categorie: "academique", tech: "network", url: "https://sugira-yannick.github.io/Sugira-Yannick/Administration-et-Securite-des-Ecosystemes-BYOD", desc: "Sécurisation des terminaux nomades" },
        { titre: "Azure Hybride", categorie: "academique", tech: "cloud", url: "https://sugira-yannick.github.io/Sugira-Yannick/Azure-Hybride", desc: "Architectures cloud hybrides & Azure Arc" },
        { titre: "Méthode Cycle V", categorie: "academique", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Methode-Cycle-V", desc: "Validation & vérification en ingénierie système" },
        { titre: "Admin Système", categorie: "academique", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Cours-Admin-Systeme", desc: "Linux, Windows Server, automatisation" },
        { titre: "SMSI (Sécurité Info)", categorie: "academique", tech: "network", url: "https://sugira-yannick.github.io/Sugira-Yannick/Systemes-de-Management-de-la-Securite-d-Information", desc: "ISO 27001, gestion des risques" },
        { titre: "Admin & Sécurisation Réseaux", categorie: "academique", tech: "network", url: "https://sugira-yannick.github.io/Administrer-et-securiser-les-infrastructures-reseaux", desc: "Firewalling, IDS/IPS, segmentation" },
        { titre: "Admin & Sécurisation Systèmes", categorie: "academique", tech: "system", url: "https://sugira-yannick.github.io/Administrer-et-securiser-les-infrastructures-systemes/", desc: "Hardening, patch management, audits" },
        { titre: "MCSA 70-740 (WS 2016)", categorie: "academique", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/MCSA-70-740-Windows-Server-2016", desc: "Installation, stockage, hyper-v" },
        { titre: "MCSA 70-741 (WS 2016)", categorie: "academique", tech: "network", url: "https://sugira-yannick.github.io/Sugira-Yannick/MCSA-70-741-Windows-Server-2016", desc: "Réseaux DNS, DHCP, IPAM" },
        { titre: "MCSA 70-742 (WS 2016)", categorie: "academique", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/MCSA-70-742-Windows-Server-2016", desc: "Active Directory, GPO, Identity" },
        { titre: "Télémétrie & Supervision", categorie: "academique", tech: "devops", url: "https://sugira-yannick.github.io/Sugira-Yannick/TELEMETRIE-SYSTEMIQUE-ET-SUPERVISION-D-INFRASTRUCTURE", desc: "Prometheus, Grafana, ELK, observabilité" },
        // TP
        { titre: "Refonte SI & Sécurisation", categorie: "tp", tech: "network", url: "https://sugira-yannick.github.io/Sugira-Yannick/REFONTE-ET-SECURISATION-DU-SYSTEME-D-INFORMATION", desc: "Audit, remédiation, architecture sécurisée" },
        { titre: "Présentation Eve-ng + ELK", categorie: "tp", tech: "network", url: "https://sugira-yannick.github.io/Sugira-Yannick/Presentation-Eve-ng-ELK", desc: "Simulation réseau & centralisation logs" },
        { titre: "Déploiement Serveur Debian", categorie: "tp", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Deploiement-Serveur-Debian-Production", desc: "Hardening, LVM, RAID, services" },
        { titre: "Infra AD Services Métiers", categorie: "tp", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Infrastructure-Active-Directory-Services-Metiers", desc: "Active Directory, DNS, DHCP, PKI" },
        { titre: "Kubernetes sur Azure", categorie: "tp", tech: "cloud", url: "https://sugira-yannick.github.io/Sugira-Yannick/Deploiement-Kubernetes-sur-Azure", desc: "AKS, conteneurisation, orchestration" },
        { titre: "Plateforme Messagerie", categorie: "tp", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Plateforme-de-Messagerie-Entreprise", desc: "Mail server, SMTP, IMAP, sécurité" },
        { titre: "Supervision Centralisée", categorie: "tp", tech: "devops", url: "https://sugira-yannick.github.io/Sugira-Yannick/Plateforme-de-Supervision-Centralisee", desc: "Nagios, Zabbix, alerting" },
        { titre: "Infra Windows Entreprise Sécurisée", categorie: "tp", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Deploiement-Infrastructure-Windows-Entreprise-Securise", desc: "Active Directory, PKI, NAP, sécurité avancée" },
        { titre: "Plateforme Base de Données", categorie: "tp", tech: "cloud", url: "https://sugira-yannick.github.io/Sugira-Yannick/Plateforme-de-Base-de-Donnees-Centralisee", desc: "SQL Server, MySQL, haute disponibilité" },
        // COMMANDES
        { titre: "Divers Commandes Importantes", categorie: "commandes", tech: "system", url: "https://sugira-yannick.github.io/Sugira-Yannick/Divers-Commandes-Importantes", desc: "Cheat sheet PowerShell, Bash, réseau" },
        // PORTFOLIO
        { titre: "Portfolio Métier/Académique", categorie: "portfolio", tech: "devops", url: "https://sugira-yannick.github.io/Sugira-Yannick/Portfolio", desc: "Projets, certifications, parcours" }
    ];

    let currentTab = 'all';
    let currentTech = 'all';
    let currentSearch = '';

    // Mise à jour stat
    document.getElementById('stat-cours').innerText = ressources.length;

    function getIcon(cat, tech) {
        const icons = { academique: '📘', tp: '⚙️', commandes: '⌨️', portfolio: '🎯' };
        if (tech === 'network') return '🌐';
        if (tech === 'cloud') return '☁️';
        if (tech === 'devops') return '🔄';
        if (tech === 'system') return '🖥️';
        return icons[cat] || '📄';
    }

    function getCategoryLabel(cat) {
        const labels = { academique: 'COURS', tp: 'LAB', commandes: 'CMD', portfolio: 'PORTFOLIO' };
        return labels[cat] || 'RESSOURCE';
    }

    function renderGrid() {
        const filtered = ressources.filter(item => {
            const matchTab = currentTab === 'all' || item.categorie === currentTab;
            const matchTech = currentTech === 'all' || item.tech === currentTech;
            const matchSearch = currentSearch === '' || item.titre.toLowerCase().includes(currentSearch.toLowerCase()) || item.desc.toLowerCase().includes(currentSearch.toLowerCase());
            return matchTab && matchTech && matchSearch;
        });

        const grid = document.getElementById('resourcesGrid');
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:4rem; background:rgba(0,0,0,0.4); border-radius:2rem; border:1px solid rgba(0,255,255,0.2);">
                                <span style="font-size:3rem;">🌀</span><br>
                                <strong>NULL_RESPONSE</strong><br>
                                <span style="font-size:0.85rem;">Aucune ressource ne correspond aux filtres actuels.</span>
                              </div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="tech-card" data-url="${item.url}" data-title="${escapeHtml(item.titre)}">
                <div class="card-header">
                    <div class="card-icon">${getIcon(item.categorie, item.tech)}</div>
                    <div>
                        <div class="card-category">${getCategoryLabel(item.categorie)}  //  #${item.tech.toUpperCase()}</div>
                        <div class="card-title">${escapeHtml(item.titre)}</div>
                    </div>
                </div>
                <div class="card-desc">${escapeHtml(item.desc)}</div>
                <div style="margin-top:1rem; font-size:0.7rem; font-family:monospace; color:#0ff5;">⤴ clic pour ouvrir</div>
            </div>
        `).join('');

        document.querySelectorAll('.tech-card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.getAttribute('data-url');
                const title = card.getAttribute('data-title');
                openInViewer(url, title);
            });
        });
    }

    function openInViewer(url, title) {
        const overlay = document.getElementById('viewerOverlay');
        const iframe = document.getElementById('viewerIframe');
        const viewerTitle = document.getElementById('viewerTitle');
        viewerTitle.innerText = `📡 ${title}`;
        iframe.src = url;
        overlay.style.display = 'flex';
        // update breadcrumb
        const bread = document.getElementById('breadcrumb');
        bread.innerHTML = `<span id="home-breadcrumb">🏠 NEXUS_HOME</span> / <span style="color:#0ff;">${title}</span>`;
        document.getElementById('home-breadcrumb').addEventListener('click', () => {
            iframe.src = 'about:blank';
            overlay.style.display = 'none';
            bread.innerHTML = `<span id="home-breadcrumb">🏠 NEXUS_HOME</span>`;
            document.getElementById('home-breadcrumb').addEventListener('click', () => location.reload());
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Event Listeners
    document.getElementById('closeViewer').addEventListener('click', () => {
        document.getElementById('viewerOverlay').style.display = 'none';
        document.getElementById('viewerIframe').src = 'about:blank';
        const bread = document.getElementById('breadcrumb');
        bread.innerHTML = `<span id="home-breadcrumb">🏠 NEXUS_HOME</span>`;
        document.getElementById('home-breadcrumb').addEventListener('click', () => location.reload());
    });

    document.getElementById('home-breadcrumb')?.addEventListener('click', () => location.reload());

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.getAttribute('data-tab');
            renderGrid();
        });
    });

    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentTech = chip.getAttribute('data-tech');
            renderGrid();
        });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderGrid();
    });

    renderGrid();

    // Canvas 3D Background (étoiles/particules)
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }
    function initStars() {
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                alpha: Math.random() * 0.8 + 0.2,
                speed: 0.05 + Math.random() * 0.1
            });
        }
    }
    function drawStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 200, 255, ${star.alpha * 0.6})`;
            ctx.fill();
            star.y -= star.speed;
            if (star.y < 0) star.y = canvas.height;
        });
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    resizeCanvas();
    drawStars();
</script>
</body>
</html>
